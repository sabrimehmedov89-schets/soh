version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ev_soh_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-ev_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ev_password}
      POSTGRES_DB: ${DB_NAME:-ev_soh_db}
      POSTGRES_INITDB_ARGS: "-c max_connections=100"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ev_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ev_soh_network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ev_soh_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://${DB_USER:-ev_user}:${DB_PASSWORD:-ev_password}@postgres:5432/${DB_NAME:-ev_soh_db}
      SECRET_KEY: ${SECRET_KEY:-your-super-secret-key-change-in-production}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000", "http://localhost:8000"]}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./backend/migrations:/app/migrations
    networks:
      - ev_soh_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ev_soh_frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
      VITE_APP_NAME: ${VITE_APP_NAME:-EV SOH Platform}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    networks:
      - ev_soh_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  ev_soh_network:
    driver: bridge
